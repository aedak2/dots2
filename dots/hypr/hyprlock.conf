background {
    monitor = 
    path = screenshot
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

general {
    hide_cursor = true
}

input-field {
    monitor = 
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(128, 128, 128, 0.2)
    inner_color = rgba(128, 128, 128, 0.2) #.2
    font_color = $foreground
    fade_on_empty = false
    rounding = -1
    check_color = rgba(242, 243, 244, 0.75)
    placeholder_text = <span foreground="##ffffff">Password</span>
  	font_family = ElectroHarmonix #JetBrains Mono Extrabold
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}
# DATE
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%A %d %B")"
  color = rgba(242, 243, 244, 0.75) #242 243 244 .75
  font_size = 22
  font_family = ElectroHarmonix #JetBrains Mono NF SemiBold
  position = 0, 300
  halign = center
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  color = rgba(242, 243, 244, 0.75)
  font_size = 95
  font_family = ElectroHarmonix #JetBrains Mono Extrabold
  position = 0, 200
  halign = center
  valign = center
}















